worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Proxy cache (MinIO responses cached locally)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=sites_cache:10m max_size=1g inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Резолвер для динамических upstream
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Основной сервер с wildcard
    server {
        listen 80;

        # Wildcard: извлекаем subdomain из Host
        server_name ~^(?<subdomain>[a-z0-9]+)\.merfy\.ru$;

        # Ignore upstream headers that prevent caching (MinIO sends Vary: Origin)
        proxy_ignore_headers X-Accel-Expires Expires Cache-Control Set-Cookie Vary;
        proxy_hide_header Vary;

        # Health check для Traefik/Coolify
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Корень → index.html
        location = / {
            set $target https://minio.merfy.ru/merfy-sites/sites/$subdomain/index.html;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Host minio.merfy.ru;
            proxy_ssl_server_name on;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;

            proxy_cache sites_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale updating error timeout;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
        }

        # Статические файлы (с расширением)
        location ~* \.(html|css|js|json|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm|pdf)$ {
            set $target https://minio.merfy.ru/merfy-sites/sites/$subdomain$uri;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Host minio.merfy.ru;
            proxy_ssl_server_name on;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;

            # Кэширование статики
            proxy_cache sites_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale updating error timeout;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=3600";
        }

        # Все остальные пути (SPA fallback на index.html в директории)
        location / {
            set $target https://minio.merfy.ru/merfy-sites/sites/$subdomain$uri/index.html;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Host minio.merfy.ru;
            proxy_ssl_server_name on;
            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;

            proxy_cache sites_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale updating error timeout;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";

            # При 404 пробуем корневой index.html (для SPA)
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # SPA fallback на корневой index.html
        location @spa_fallback {
            set $target https://minio.merfy.ru/merfy-sites/sites/$subdomain/index.html;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Host minio.merfy.ru;
            proxy_ssl_server_name on;
        }

        # Кастомная 404 если и fallback не сработал
        error_page 404 /404.html;
        location = /404.html {
            internal;
            return 404 '<!DOCTYPE html><html><head><title>404</title></head><body><h1>Page Not Found</h1></body></html>';
            add_header Content-Type text/html;
        }
    }

    # Fallback для неизвестных хостов
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            return 404 'Site not found';
        }
    }
}
